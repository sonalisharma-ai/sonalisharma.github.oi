<!DOCTYPE html>
<html>
<head>
    <title>Contact | Shree Aasthapura Traders</title>

    <style>
        body { font-family:Arial; margin:0; background:#0f172a; color:white;}
        nav { background:#1e293b; padding:15px; text-align:center;}
        nav a { color:white; margin:0 15px; text-decoration:none;}

        .container { display:grid; grid-template-columns:1fr 1fr; gap:40px; padding:40px;}

        .box { background:#1e293b; padding:20px; border-radius:10px;}

        input, textarea {
            width:100%;
            padding:10px;
            margin-top:10px;
            border:none;
            border-radius:5px;
        }

        button {
            margin-top:15px;
            padding:10px;
            background:#38bdf8;
            border:none;
            cursor:pointer;
        }

        @media(max-width:800px){
            .container { grid-template-columns:1fr;}
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <div class="box">
        <h2>Contact Info</h2>
        <p>📍 Saskatoon, Canada</p>
        <p>📧 your@email.com</p>
        <p>📞 +1 000 000 0000</p>
    </div>

    <div class="box">
        <h2>Request a Quote</h2>

        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea rows="5" placeholder="Your request"></textarea>
            <button>Send</button>
        </form>
    </div>

</div>

</body>
</html>
