<!DOCTYPE html>
<html>
<head>
    <title>Contact | Shree Asthapura Traders</title>

    <style>
        body { margin:0; font-family: Arial; background:#ffffff;}

        nav {
            display:flex;

            align-items:center;
            padding:15px 40px;
            background:#0b1f3a;

        }

        nav h2 { color:#fbbf24; margin:0; }

        nav a {
            color:white;
            margin-left:20px;
            text-decoration:none;
        }

        .btn {
            background:#fbbf24;
            padding:10px 18px;
            border-radius:5px;

        }

        .hero {
            background:#0b1f3a;
            color:white;
            padding:80px 40px;
            text-align:center;
        }

        .container {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:40px;
            padding:50px;
        }

        .box {

            border-radius:10px;
            padding:20px;

        input, textarea {

        }

        button {
            margin-top:15px;
            padding:12px;
            background:#fbbf24;
            border:none;
            cursor:pointer;
        }

        @media(max-width:800px){
            .container { grid-template-columns:1fr;}
        }

        footer {
            background:#0b1f3a;
            color:white;
            text-align:center;
            padding:20px;
        }

<nav>

<form action="https://formspree.io/f/yourformid" method="POST">

    <textarea name="message" rows="5" placeholder="Your Message"></textarea>
